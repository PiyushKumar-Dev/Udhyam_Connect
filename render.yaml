databases:
  - name: udhyam-db
    plan: free
    databaseName: ubid
    user: ubid

services:
  - type: web
    name: udhyam-backend
    plan: free
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: .
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: udhyam-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_ORIGIN
        value: https://udhyam-frontend.onrender.com
      - key: ML_SERVICE_URL
        value: https://udhyam-ml-service.onrender.com

  - type: web
    name: udhyam-ml-service
    plan: free
    runtime: docker
    dockerfilePath: ml-service/Dockerfile
    dockerContext: ml-service

  - type: web
    name: udhyam-frontend
    plan: free
    runtime: docker
    dockerfilePath: frontend/Dockerfile
    dockerContext: frontend
    envVars:
      - key: VITE_API_BASE_URL
        value: https://udhyam-backend.onrender.com
