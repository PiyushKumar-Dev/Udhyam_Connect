databases:
  - name: ubid-db
    plan: free
    databaseName: ubid
    user: ubid

services:
  - type: web
    name: ubid-backend
    plan: free
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: .
    healthCheckPath: /api/stats
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ubid-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_ORIGIN
        value: https://ubid-frontend.onrender.com
    buildCommand: ""
    startCommand: "sh -c 'alembic upgrade head && python data/seed.py && uvicorn backend.app.main:app --host 0.0.0.0 --port 8000'"

  - type: web
    name: ubid-frontend
    plan: free
    runtime: docker
    dockerfilePath: frontend/Dockerfile
    dockerContext: frontend
    envVars:
      - key: VITE_API_BASE_URL
        value: https://ubid-backend.onrender.com
