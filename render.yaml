databases:
  - name: udhyam-db
    plan: free
    databaseName: ubid
    user: ubid

services:
  - type: web
    name: udhyam-backend
    plan: free
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: .
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: udhyam-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_ORIGIN
        value: https://udhyam-frontend.onrender.com
    startCommand: "sh -c 'alembic upgrade head && python data/seed.py && uvicorn backend.app.main:app --host 0.0.0.0 --port 8000'"

  - type: web
    name: udhyam-frontend
    plan: free
    runtime: docker
    dockerfilePath: frontend/Dockerfile
    dockerContext: frontend
    envVars:
      - key: VITE_API_BASE_URL
        value: https://udhyam-backend.onrender.com
