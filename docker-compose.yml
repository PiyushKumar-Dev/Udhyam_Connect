services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ubid
      POSTGRES_PASSWORD: ubid_secret
      POSTGRES_DB: ubid
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: always
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://ubid:ubid_secret@db:5432/ubid
      FRONTEND_ORIGIN: http://localhost:3000
    ports:
      - "8000:8000"

  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8001:8001"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres_data: