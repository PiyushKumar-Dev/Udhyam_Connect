services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: ubid
      POSTGRES_USER: ubid
      POSTGRES_PASSWORD: ubid_secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ubid"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://ubid:ubid_secret@db:5432/ubid
      SECRET_KEY: change_this_in_production
      FRONTEND_ORIGIN: http://localhost:3000
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head && python data/seed.py && uvicorn backend.app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  pgdata: